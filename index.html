<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Una carta especial</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg1: #fff7fb;
      --bg2: #ffe4ef;
      --bg3: #ffd2e5;
      --primary: #ff4f87;
      --primary-2: #ff6fa1;
      --text: #2c2030;
      --soft: #f4f0f3;
      --card: rgba(255,255,255,0.94);
    }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, var(--bg1) 0%, var(--bg2) 45%, var(--bg3) 100%);
      color: var(--text);
      touch-action: manipulation;
    }

    body {
      position: fixed;
      inset: 0;
    }

    .sparkles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.45;
      background:
        radial-gradient(circle at 15% 20%, rgba(255,255,255,0.95) 0 2px, transparent 3px),
        radial-gradient(circle at 80% 18%, rgba(255,255,255,0.8) 0 2px, transparent 3px),
        radial-gradient(circle at 72% 68%, rgba(255,255,255,0.8) 0 2px, transparent 3px),
        radial-gradient(circle at 24% 74%, rgba(255,255,255,0.7) 0 2px, transparent 3px);
      background-size: 240px 240px;
      animation: drift 8s linear infinite;
    }

    @keyframes drift {
      from { transform: translateY(0); }
      to { transform: translateY(-18px); }
    }

    .screen {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: max(18px, env(safe-area-inset-top)) 18px max(18px, env(safe-area-inset-bottom));
    }

    .hidden { display: none; }

    .card {
      width: min(94vw, 720px);
      background: var(--card);
      border-radius: 28px;
      padding: 28px 20px;
      text-align: center;
      box-shadow: 0 20px 55px rgba(0,0,0,0.14);
      backdrop-filter: blur(10px);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 7vw, 3.1rem);
      line-height: 1.1;
    }

    p {
      margin: 0 0 24px;
      font-size: clamp(1rem, 3.8vw, 1.18rem);
      line-height: 1.5;
    }

    .small {
      font-size: 0.95rem;
      opacity: 0.8;
      margin-top: 14px;
    }

    .heart {
      display: block;
      font-size: 2rem;
      margin-bottom: 8px;
      animation: pulse 1.6s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    .btn-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 700;
      min-height: 58px;
      padding: 14px 22px;
      font-size: 1rem;
      transition: transform 0.22s ease, box-shadow 0.22s ease, opacity 0.22s ease, left 0.18s ease, top 0.18s ease;
      box-shadow: 0 10px 22px rgba(0,0,0,0.12);
    }

    .primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      color: white;
    }

    .secondary {
      background: #f3f1f4;
      color: var(--text);
    }

    .ghost {
      background: white;
      color: var(--primary);
      border: 2px solid #ffc4d8;
    }

    .bounce {
      animation: bounce 0.35s ease;
    }

    @keyframes bounce {
      0% { transform: scale(1); }
      40% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    /* Carta inicial */
    .envelope-wrap {
      display: grid;
      place-items: center;
      margin-bottom: 18px;
      perspective: 1000px;
    }

    .envelope {
      position: relative;
      width: min(70vw, 260px);
      aspect-ratio: 1.35 / 1;
      margin: 4px auto 18px;
    }

    .envelope-base {
      position: absolute;
      inset: 0;
      border-radius: 18px;
      background: linear-gradient(145deg, #fff, #ffe9f2);
      box-shadow: 0 18px 30px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    .envelope-letter {
      position: absolute;
      left: 10%;
      right: 10%;
      bottom: 14%;
      height: 58%;
      border-radius: 12px;
      background: white;
      box-shadow: 0 6px 16px rgba(0,0,0,0.08);
      display: grid;
      place-items: center;
      color: #c46b90;
      font-weight: 700;
      transform: translateY(0);
      transition: transform 0.6s ease;
    }

    .envelope-flap {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 52%;
      background: linear-gradient(145deg, #ffd6e6, #ffbdd7);
      clip-path: polygon(0 0, 100% 0, 50% 100%);
      transform-origin: top center;
      transition: transform 0.7s ease;
      z-index: 2;
    }

    .envelope.open .envelope-flap {
      transform: rotateX(180deg);
    }

    .envelope.open .envelope-letter {
      transform: translateY(-18px);
    }

    /* Pantalla propuesta móvil */
    #proposalCard {
      width: min(95vw, 760px);
      min-height: min(80vh, 700px);
      position: relative;
      overflow: hidden;
    }

    #proposalStage {
      position: relative;
      width: 100%;
      height: min(54vh, 420px);
      margin-top: 12px;
      border-radius: 22px;
    }

    #yesBtn, #noBtn {
      position: absolute;
      transform-origin: center center;
      white-space: nowrap;
      user-select: none;
    }

    #yesBtn {
      left: 12%;
      top: 44%;
      min-width: 112px;
      z-index: 1;
    }

    #noBtn {
      left: 58%;
      top: 44%;
      min-width: 166px;
      z-index: 2;
      font-size: 0.98rem;
      line-height: 1.15;
    }

    #feedback {
      min-height: 28px;
      margin-top: 8px;
      font-size: 0.95rem;
      opacity: 0.78;
    }

    .hearts {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .floating-heart {
      position: absolute;
      bottom: -40px;
      font-size: 24px;
      animation: flyUp 2.8s linear forwards;
    }

    @keyframes flyUp {
      0% { transform: translateY(0) scale(0.9); opacity: 0; }
      15% { opacity: 1; }
      100% { transform: translateY(-110vh) scale(1.35); opacity: 0; }
    }

    @media (max-width: 520px) {
      .card { padding: 24px 16px; }
      #proposalCard { min-height: 78vh; }
      #proposalStage { height: 48vh; }
      #yesBtn { left: 10%; top: 48%; }
      #noBtn { left: 54%; top: 30%; }
    }
  </style>
</head>
<body>
  <div class="sparkles"></div>
  <div class="hearts" id="heartsLayer"></div>

  <!-- PANTALLA 1 -->
  <section class="screen" id="introScreen">
    <div class="card">
      <span class="heart">💌</span>
      <div class="envelope-wrap">
        <div class="envelope" id="envelope">
          <div class="envelope-base"></div>
          <div class="envelope-letter">Para ti ✨</div>
          <div class="envelope-flap"></div>
        </div>
      </div>

      <h1>¿Quieres abrir esta carta?</h1>
      <p>Prometo que dentro hay una pregunta importante.</p>

      <div class="btn-row">
        <button id="openYesBtn" class="primary">Sí</button>
        <button id="openNoBtn" class="secondary">No</button>
      </div>

      <div class="small">Después del primer toque empezará la melodía.</div>
    </div>
  </section>

  <!-- PANTALLA 2 -->
  <section class="screen hidden" id="proposalScreen">
    <div class="card" id="proposalCard">
      <span class="heart">✨</span>
      <h1>¿Quieres ser mi novia?</h1>
      <p>Antes de contestar... recuerda que soy encantador.</p>
      <div id="feedback"></div>

      <div id="proposalStage">
        <button id="yesBtn" class="primary">Sí</button>
        <button id="noBtn" class="secondary">No</button>
      </div>
    </div>
  </section>

  <!-- PANTALLA FINAL -->
  <section class="screen hidden" id="finalScreen">
    <div class="card">
      <span class="heart">💖</span>
      <h1>Sabía que dirías que sí</h1>
      <p>Ahora esta carta ya tiene el final perfecto.</p>
    </div>
  </section>

  <audio id="bgMusic" loop>
    <source src="melodia.mp3" type="audio/mpeg" />
  </audio>

  <script>
    const introScreen = document.getElementById('introScreen');
    const proposalScreen = document.getElementById('proposalScreen');
    const finalScreen = document.getElementById('finalScreen');

    const envelope = document.getElementById('envelope');
    const openYesBtn = document.getElementById('openYesBtn');
    const openNoBtn = document.getElementById('openNoBtn');

    const yesBtn = document.getElementById('yesBtn');
    const noBtn = document.getElementById('noBtn');
    const proposalStage = document.getElementById('proposalStage');
    const feedback = document.getElementById('feedback');
    const heartsLayer = document.getElementById('heartsLayer');
    const bgMusic = document.getElementById('bgMusic');

    let noCount = 0;
    let yesScale = 1;
    let noScale = 1;
    let escapeMode = false;

    const MIN_NO_SCALE = 0.76;
    const MAX_YES_SCALE = 4.8;

    const noTexts = [
      'No',
      '¿Segura?',
      'Piénsalo 😌',
      'Prometo flores 🌹',
      'Y bombones 🍫',
      'Y citas bonitas ✨',
      'Y muchas risas 😏',
      'Mira que soy majo 🙈',
      'Última oportunidad 😬',
      'Vale... si me pillas'
    ];

    const feedbackTexts = [
      '',
      'Mmm... creo que ese no merece revisión.',
      'Yo revisaría esa respuesta una vez más.',
      'Oferta limitada: flores incluidas.',
      'Añadiendo bombones a la propuesta.',
      'Subiendo el nivel romántico.',
      'Esto se está poniendo interesante.',
      'Yo noto que ese sí quiere salir.',
      'Estamos muy cerca del desenlace.',
      'Acepto el no... si consigues tocarlo.'
    ];

    function vibrate(ms = 18) {
      if (navigator.vibrate) navigator.vibrate(ms);
    }

    function playMusic() {
      bgMusic.play().catch(() => {});
    }

    function openLetter() {
      envelope.classList.add('open');
      playMusic();
      setTimeout(() => {
        introScreen.classList.add('hidden');
        proposalScreen.classList.remove('hidden');
        repositionWithinBounds();
      }, 700);
    }

    openYesBtn.addEventListener('click', openLetter);
    openNoBtn.addEventListener('click', () => {
      openNoBtn.textContent = 'Sí, hombre 😌';
      openNoBtn.classList.add('bounce');
      setTimeout(() => openNoBtn.classList.remove('bounce'), 350);
    });

    yesBtn.addEventListener('click', () => {
      proposalScreen.classList.add('hidden');
      finalScreen.classList.remove('hidden');
      launchHearts();
      vibrate(35);
    });

    noBtn.addEventListener('click', handleNoInteraction);
    noBtn.addEventListener('touchstart', handleEscapeTouch, { passive: false });

    window.addEventListener('resize', () => {
      repositionWithinBounds();
    });

    function handleNoInteraction() {
      noCount++;
      noBtn.textContent = noTexts[Math.min(noCount, noTexts.length - 1)];
      feedback.textContent = feedbackTexts[Math.min(noCount, feedbackTexts.length - 1)];
      vibrate();

      if (noCount <= 9) {
        yesScale += 0.36;
        noScale -= 0.025;

        if (yesScale > MAX_YES_SCALE) yesScale = MAX_YES_SCALE;
        if (noScale < MIN_NO_SCALE) noScale = MIN_NO_SCALE;

        applyScalesWithoutOverlap();
        yesBtn.classList.add('bounce');
        setTimeout(() => yesBtn.classList.remove('bounce'), 320);
      }

      if (noCount >= 10) {
        escapeMode = true;
        noBtn.textContent = noTexts[9];
        feedback.textContent = feedbackTexts[9];
        moveNoButtonRandomly();
      }
    }

    function handleEscapeTouch(event) {
      if (!escapeMode) return;
      event.preventDefault();
      moveNoButtonRandomly();
      vibrate(12);
    }

    function getBasePosition(button) {
      return {
        left: parseFloat(button.style.left) || button.offsetLeft,
        top: parseFloat(button.style.top) || button.offsetTop
      };
    }

    function getScaledRect(button, scale, left, top) {
      const baseWidth = button.offsetWidth;
      const baseHeight = button.offsetHeight;
      const scaledWidth = baseWidth * scale;
      const scaledHeight = baseHeight * scale;
      return {
        left: left - (scaledWidth - baseWidth) / 2,
        top: top - (scaledHeight - baseHeight) / 2,
        right: left - (scaledWidth - baseWidth) / 2 + scaledWidth,
        bottom: top - (scaledHeight - baseHeight) / 2 + scaledHeight,
        width: scaledWidth,
        height: scaledHeight
      };
    }

    function overlaps(a, b, margin = 26) {
      return !(
        a.right + margin < b.left ||
        a.left - margin > b.right ||
        a.bottom + margin < b.top ||
        a.top - margin > b.bottom
      );
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function applyScalesWithoutOverlap() {
      const stageRect = proposalStage.getBoundingClientRect();
      const yesPos = getBasePosition(yesBtn);
      const noPos = getBasePosition(noBtn);

      let testYesScale = yesScale;
      let yesRect = getScaledRect(yesBtn, testYesScale, yesPos.left, yesPos.top);
      let noRect = getScaledRect(noBtn, noScale, noPos.left, noPos.top);

      while ((overlaps(yesRect, noRect, 24) || yesRect.left < 0 || yesRect.right > stageRect.width || yesRect.top < 0 || yesRect.bottom > stageRect.height) && testYesScale > 1) {
        testYesScale -= 0.06;
        yesRect = getScaledRect(yesBtn, testYesScale, yesPos.left, yesPos.top);
      }

      yesScale = testYesScale;
      noScale = Math.max(noScale, MIN_NO_SCALE);

      noBtn.style.fontSize = `${Math.max(0.86, 0.98 * noScale)}rem`;
      noBtn.style.padding = `${Math.max(12, 14 * noScale)}px ${Math.max(18, 24 * noScale)}px`;

      yesBtn.style.transform = `scale(${yesScale})`;
      noBtn.style.transform = `scale(${noScale})`;

      repositionWithinBounds();
    }

    function repositionWithinBounds() {
      const stageWidth = proposalStage.clientWidth;
      const stageHeight = proposalStage.clientHeight;

      const yesPos = getBasePosition(yesBtn);
      const noPos = getBasePosition(noBtn);

      const yesRect = getScaledRect(yesBtn, yesScale, yesPos.left, yesPos.top);
      const noRect = getScaledRect(noBtn, noScale, noPos.left, noPos.top);

      let correctedYesLeft = clamp(yesPos.left, (yesRect.width - yesBtn.offsetWidth) / 2, stageWidth - yesBtn.offsetWidth - (yesRect.width - yesBtn.offsetWidth) / 2);
      let correctedYesTop = clamp(yesPos.top, (yesRect.height - yesBtn.offsetHeight) / 2, stageHeight - yesBtn.offsetHeight - (yesRect.height - yesBtn.offsetHeight) / 2);

      yesBtn.style.left = `${correctedYesLeft}px`;
      yesBtn.style.top = `${correctedYesTop}px`;

      let correctedNoLeft = clamp(noPos.left, 0, Math.max(0, stageWidth - noBtn.offsetWidth));
      let correctedNoTop = clamp(noPos.top, 0, Math.max(0, stageHeight - noBtn.offsetHeight));

      noBtn.style.left = `${correctedNoLeft}px`;
      noBtn.style.top = `${correctedNoTop}px`;

      if (escapeMode) moveNoButtonRandomly();
    }

    function moveNoButtonRandomly() {
      const stageWidth = proposalStage.clientWidth;
      const stageHeight = proposalStage.clientHeight;

      const yesPos = getBasePosition(yesBtn);
      const yesRect = getScaledRect(yesBtn, yesScale, yesPos.left, yesPos.top);

      const maxLeft = Math.max(0, stageWidth - noBtn.offsetWidth);
      const maxTop = Math.max(0, stageHeight - noBtn.offsetHeight);

      let placed = false;
      let attempts = 0;

      while (!placed && attempts < 120) {
        const randomLeft = Math.random() * maxLeft;
        const randomTop = Math.random() * maxTop;
        const candidateRect = getScaledRect(noBtn, noScale, randomLeft, randomTop);

        const insideStage = candidateRect.left >= 0 && candidateRect.right <= stageWidth && candidateRect.top >= 0 && candidateRect.bottom <= stageHeight;

        if (insideStage && !overlaps(candidateRect, yesRect, 30)) {
          noBtn.style.left = `${randomLeft}px`;
          noBtn.style.top = `${randomTop}px`;
          placed = true;
        }

        attempts++;
      }
    }

    function launchHearts() {
      for (let i = 0; i < 18; i++) {
        const heart = document.createElement('div');
        heart.className = 'floating-heart';
        heart.textContent = ['💖', '💕', '💗', '✨'][Math.floor(Math.random() * 4)];
        heart.style.left = `${Math.random() * 100}%`;
        heart.style.animationDelay = `${Math.random() * 0.9}s`;
        heart.style.fontSize = `${20 + Math.random() * 18}px`;
        heartsLayer.appendChild(heart);
        setTimeout(() => heart.remove(), 3200);
      }
    }
  </script>
</body>
</html>
